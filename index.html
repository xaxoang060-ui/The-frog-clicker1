    <script>
        (function() {
            // --- УТИЛИТЫ (COOKIE) ---
            function getCookie(name) {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
                return null;
            }
            function setCookie(name, value, days = 365) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                const expires = `expires=${date.toUTCString()}`;
                document.cookie = `${name}=${value}; ${expires}; path=/; SameSite=Strict`;
            }
            function encrypt(data) {
                return btoa(encodeURIComponent(JSON.stringify(data)));
            }
            function decrypt(encrypted) {
                try {
                    return JSON.parse(decodeURIComponent(atob(encrypted)));
                } catch {
                    return null;
                }
            }
            async function getIP() {
                let ip = getCookie('user_ip');
                if (ip) {
                    document.getElementById('ipDisplay').innerHTML = `🌐 Ваш IP: ${ip}`;
                    return ip;
                }
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    ip = data.ip;
                    setCookie('user_ip', ip, 365);
                    document.getElementById('ipDisplay').innerHTML = `🌐 Ваш IP: ${ip}`;
                    return ip;
                } catch {
                    document.getElementById('ipDisplay').innerHTML = '🌐 Не удалось определить IP';
                    return 'unknown_' + Math.random().toString(36).substring(7);
                }
            }
            function loadGameByIP() {
                const ip = getCookie('user_ip');
                if (!ip) return null;
                const cookieName = `frog_save_${ip.replace(/\./g, '_')}`;
                const savedData = getCookie(cookieName);
                if (savedData) {
                    return decrypt(savedData);
                }
                return null;
            }
            function saveGameByIP(gameState) {
                const ip = getCookie('user_ip');
                if (!ip) return false;
                const cookieName = `frog_save_${ip.replace(/\./g, '_')}`;
                const encrypted = encrypt(gameState);
                setCookie(cookieName, encrypted, 365);
                return true;

            // --- СОСТОЯНИЕ ИГРЫ ---

            const synergyUpgradesDiv = document.getElementById('synergyUpgrades');
            
            const skinShopBtn = document.getElementById('skinShopBtn');
            const effectShopBtn = document.getElementById('effectShopBtn');
            const adRewardBtn = document.getElementById('adRewardBtn');
            const adTimer = document.getElementById('adTimer');
            const resetBtn = document.getElementById('resetBtn');

            // --- ТАЙМЕР РЕКЛАМЫ ---
            let adCooldown = 0;
            function updateAdTimer() {
                if (adCooldown > 0) {
                    adTimer.textContent = `⏳ Подождите ${adCooldown} сек`;
                    adRewardBtn.disabled = true;
                } else {
                    adTimer.textContent = '📺 Доступно! Нажми для награды';
                    adRewardBtn.disabled = false;
                }
            }
            function startAdCooldown() {
                adCooldown = 60;
                updateAdTimer();
                const interval = setInterval(() => {
                    adCooldown--;
                    updateAdTimer();
                    if (adCooldown <= 0) clearInterval(interval);
                }, 1000);
            }

            // --- ЗВУКИ ---
            let audioContext = null;
            function initAudio() {
                if (audioContext) return;
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {}
            }
            function playCroakSound() {
                if (!audioContext || audioContext.state !== 'running') return;
                const now = audioContext.currentTime;
                const osc1 = audioContext.createOscillator();
                const osc2 = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc1.type = 'sawtooth';
                osc2.type = 'triangle';
                osc1.frequency.setValueAtTime(150, now);
                osc1.frequency.exponentialRampToValueAtTime(90, now + 0.15);
                osc2.frequency.setValueAtTime(220, now);
                osc2.frequency.exponentialRampToValueAtTime(130, now + 0.12);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(audioContext.destination);
                osc1.start(now);
                osc2.start(now);
                osc1.stop(now + 0.25);
                osc2.stop(now + 0.25);
            }
            function playPurchaseSound() {
                if (!audioContext || audioContext.state !== 'running') return;
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.start(now);
                osc.stop(now + 0.15);
            }

            // --- ЭФФЕКТЫ ---
            function createEffect(x, y, type) {
                const effect = document.createElement('div');
                effect.className = 'effect-particle';
                effect.style.left = x + 'px';
                effect.style.top = y + 'px';
                switch(type) {
                    case '🎉 Конфетти':
                        effect.innerHTML = ['🎊', '🎉', '✨', '🎈'][Math.floor(Math.random() * 4)];
                        break;
                    case '🍃 Листья':
                        effect.innerHTML = ['🍃', '🌿', '🍂'][Math.floor(Math.random() * 3)];
                        break;
                    case '⭐ Звёздочки':
                        effect.innerHTML = '⭐';
                        effect.style.color = '#ffd700';
                        break;
                    default:
                        effect.innerHTML = '✨';
                }
                effect.style.fontSize = '2rem';
                document.body.appendChild(effect);
                setTimeout(() => effect.remove(), 1000);
            }

            // --- РАСЧЁТЫ ---
            function getClickPower() {
                let power = 1;
                if (clickUpgradesList[0]?.bought) power += buildings[0].count;
                if (clickUpgradesList[1]?.bought) power += buildings[0].count * 0.1;
                if (clickUpgradesList[2]?.bought) power += buildings[0].count;
                let buildingBonus = 0;
                if (clickUpgradesList[3]?.bought) buildingBonus += 0.1;
                if (clickUpgradesList[4]?.bought) buildingBonus += 0.5;
                if (clickUpgradesList[5]?.bought) buildingBonus += 5;
                if (buildingBonus > 0) {
                    let totalBuildings = buildings.reduce((sum, b) => sum + b.count, 0);
                    power += totalBuildings * buildingBonus;
                }
                return power;
            }
            function getBuildingCPS(buildingId) {
                let base = buildings[buildingId].cps * buildings[buildingId].count;
                let mult = Math.pow(2, buildings[buildingId].upgrades);
                return base * mult;
            }
            function getTotalCPS() {
                let total = 0;
                for (let i = 0; i < buildings.length; i++) {
                    total += getBuildingCPS(i);
                }
                let kittenMult = 1;
                let kittenBonus = 0;
                for (let kitten of kittenUpgradesList) {
                    if (kitten.bought) kittenBonus += 0.05;
                }
                if (kittenBonus > 0) {
                    kittenMult = 1 + (achievements * kittenBonus);
                }
                return total * kittenMult;
            }

            // --- ПОКУПКИ ---
            window.buyBuilding = function(buildingId) {
                const building = buildings[buildingId];
                const cost = Math.floor(building.baseCost * Math.pow(1.15, building.count));
                if (points >= cost) {
                    points -= cost;
                    building.count++;
                    achievements = buildings.reduce((sum, b) => sum + b.count, 0);
                    playPurchaseSound();
                    refreshUI();
                    autoSave();
                }
            };
            window.buyClickUpgrade = function(index) {
                const up = clickUpgradesList[index];
                if (points >= up.cost && !up.bought) {
                    points -= up.cost;
                    up.bought = true;
                    playPurchaseSound();
                    refreshUI();
                    autoSave();
                }
            };
            window.buyBuildingUpgrade = function(index) {
                const up = buildingUpgradesList[index];
                if (points >= up.cost && !up.bought) {
                    points -= up.cost;
                    up.bought = true;
                    buildings[up.buildingId].upgrades++;
                    playPurchaseSound();
                    refreshUI();
                    autoSave();
                }
            };
            window.buyKittenUpgrade = function(index) {
                const up = kittenUpgradesList[index];
                if (points >= up.cost && !up.bought) {
                    points -= up.cost;
                    up.bought = true;
                    playPurchaseSound();
                    refreshUI();
                    autoSave();
                }
            };
            window.buySynergyUpgrade = function(index) {
                const up = synergyList[index];
                if (points >= up.cost && !up.bought) {
                    points -= up.cost;
                    up.bought = true;
                    playPurchaseSound();
                    refreshUI();
                    autoSave();
                }
            };
            window.buySkin = function(index) {
                const skin = skins[index];
                if (points >= skin.cost && !skin.bought) {
                    points -= skin.cost;
                    skin.bought = true;
                    if (currentSkin !== 'default') {
                        clickButton.classList.remove(currentSkin);
                    }
                    clickButton.classList.add(skin.class);
                    currentSkin = skin.class;
                    playPurchaseSound();
                    refreshUI();
                    autoSave();
                }
            };
            window.buyEffect = function(index) {
                const effect = effects[index];
                if (points >= effect.cost && !effect.bought) {
                    points -= effect.cost;
                    effect.bought = true;
                    currentEffect = effect.name;
                    playPurchaseSound();
                    refreshUI();
                    autoSave();
                }
            };

            // --- ОБНОВЛЕНИЕ UI ---
            function refreshUI() {
                pointsDisplay.textContent = Math.floor(points);
                clickPowerDisplay.textContent = getClickPower().toFixed(1);
                cpsDisplay.textContent = getTotalCPS().toFixed(1);
                
                let buildingStatsHtml = '';
                for (let i = 0; i < buildings.length; i++) {
                    buildingStatsHtml += `
                        <div class="building-stat">
                            <span>${buildings[i].name}</span>
                            <span>${buildings[i].count} (${getBuildingCPS(i).toFixed(1)}/c)</span>
                        </div>
                    `;
                }
                buildingStatsDiv.innerHTML = buildingStatsHtml;
                
                let buildingHtml = '';
                for (let i = 0; i < buildings.length; i++) {
                    const cost = Math.floor(buildings[i].baseCost * Math.pow(1.15, buildings[i].count));
                    buildingHtml += `
                        <div class="upgrade-item">
                            <div>
                                <div class="upgrade-name">${buildings[i].name}</div>
                                <div class="upgrade-desc">${buildings[i].count} шт • ${getBuildingCPS(i).toFixed(1)}/c</div>
                            </div>
                            <div>
                                <div class="upgrade-price">🐸 ${cost}</div>
                                <button class="buy-btn" onclick="buyBuilding(${i})" ${points < cost ? 'disabled' : ''}>➕</button>
                            </div>
                        </div>
                    `;
                }
                buildingListDiv.innerHTML = buildingHtml;
                
                let clickHtml = '';
                clickUpgradesList.forEach((up, index) => {
                    clickHtml += `
                        <div class="upgrade-item ${up.bought ? 'purchased' : ''}">
                            <div>
                                <div class="upgrade-name">${up.name}</div>
                                <div class="upgrade-desc">${up.desc}</div>
                            </div>
                            <div>
                                <div class="upgrade-price">🐸 ${Math.floor(up.cost)}</div>
                                <button class="buy-btn ${up.bought ? 'purchased' : ''}" onclick="buyClickUpgrade(${index})" ${up.bought || points < up.cost ? 'disabled' : ''}>${up.bought ? '✓' : '➕'}</button>
                            </div>
                        </div>
                    `;
                });
                clickUpgradesDiv.innerHTML = clickHtml;
                
                let buildingUpgradeHtml = '';
                buildingUpgradesList.forEach((up, index) => {
                    if (buildings[up.buildingId].count > 0 || up.bought) {
                        buildingUpgradeHtml += `
                            <div class="upgrade-item ${up.bought ? 'purchased' : ''}">
                                <div>
                                    <div class="upgrade-name">${up.name}</div>
                                    <div class="upgrade-desc">${up.desc}</div>
                                </div>
                                <div>
                                    <div class="upgrade-price">🐸 ${Math.floor(up.cost)}</div>
                                    <button class="buy-btn ${up.bought ? 'purchased' : ''}" onclick="buyBuildingUpgrade(${index})" ${up.bought || points < up.cost ? 'disabled' : ''}>${up.bought ? '✓' : '➕'}</button>
                                </div>
                            </div>
                        `;
                    }
                });
                buildingUpgradesDiv.innerHTML = buildingUpgradeHtml || '<div class="upgrade-item">Нет доступных улучшений</div>';
                
                let kittenHtml = '';
                kittenUpgradesList.forEach((up, index) => {
                    kittenHtml += `
                        <div class="upgrade-item ${up.bought ? 'purchased' : ''}">
                            <div>
                                <div class="upgrade-name">${up.name}</div>
                                <div class="upgrade-desc">${up.desc}</div>
                            </div>
                            <div>
                                <div class="upgrade-price">🐸 ${Math.floor(up.cost)}</div>
                                <button class="buy-btn ${up.bought ? 'purchased' : ''}" onclick="buyKittenUpgrade(${index})" ${up.bought || points < up.cost ? 'disabled' : ''}>${up.bought ? '✓' : '➕'}</button>
                            </div>
                        </div>
                    `;
                });
                kittenUpgradesDiv.innerHTML = kittenHtml;
                
                let synergyHtml = '';
                synergyList.forEach((up, index) => {
                    synergyHtml += `
                        <div class="upgrade-item ${up.bought ? 'purchased' : ''}">
                            <div>
                                <div class="upgrade-name">${up.name}</div>
                                <div class="upgrade-desc">${up.desc}</div>
                            </div>
                            <div>
                                <div class="upgrade-price">🐸 ${Math.floor(up.cost)}</div>
                                <button class="buy-btn ${up.bought ? 'purchased' : ''}" onclick="buySynergyUpgrade(${index})" ${up.bought || points < up.cost ? 'disabled' : ''}>${up.bought ? '✓' : '➕'}</button>
                            </div>
                        </div>
                    `;
                });
                synergyUpgradesDiv.innerHTML = synergyHtml;
                
                let skinHtml = '';
                skins.forEach((skin, index) => {
                    const isCurrent = currentSkin === skin.class;
                    skinHtml += `
                        <div class="upgrade-item ${skin.bought ? 'purchased' : ''}">
                            <div>
                                <div class="upgrade-name">${skin.emoji} ${skin.name} ${isCurrent ? '✅' : ''}</div>
                                <div class="upgrade-desc">${skin.bought ? 'Куплен' : 'Цена: ' + skin.cost}</div>
                            </div>
                            <div>
                                <div class="upgrade-price">🐸 ${skin.cost}</div>
                                <button class="buy-btn ${skin.bought ? 'purchased' : ''}" onclick="buySkin(${index})" ${skin.bought || points < skin.cost ? 'disabled' : ''}>${skin.bought ? '✓' : '➕'}</button>
                            </div>
                        </div>
                    `;
                });
                skinUpgradesDiv.innerHTML = skinHtml;
                
                let effectHtml = '';
                effects.forEach((effect, index) => {
                    const isCurrent = currentEffect === effect.name;
                    effectHtml += `
                        <div class="upgrade-item ${effect.bought ? 'purchased' : ''}">
                            <div>
                                <div class="upgrade-name">${effect.name} ${isCurrent ? '✅' : ''}</div>
                                <div class="upgrade-desc">${effect.desc}</div>
                            </div>
                            <div>
                                <div class="upgrade-price">🐸 ${effect.cost}</div>
                                <button class="buy-btn ${effect.bought ? 'purchased' : ''}" onclick="buyEffect(${index})" ${effect.bought || points < effect.cost ? 'disabled' : ''}>${effect.bought ? '✓' : '➕'}</button>
                            </div>
                        </div>
                    `;
                });
                effectUpgradesDiv.innerHTML = effectHtml;
            }

            // --- КЛИК ПО ЛЯГУШКЕ ---
            function handleClick() {
                initAudio();
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                points += getClickPower();
                playCroakSound();
                
                if (currentEffect !== 'none') {
                    const rect = clickButton.getBoundingClientRect();
                    const x = rect.left + rect.width/2 + window.scrollX;
                    const y = rect.top + rect.height/2 + window.scrollY;
                    
                    if (currentEffect === '🎉 Конфетти') {
                        for (let i = 0; i < 8; i++) {
                            setTimeout(() => {
                                createEffect(x + (Math.random()-0.5)*100, y + (Math.random()-0.5)*50, currentEffect);
                            }, i * 50);
                        }
                    } else {
                        for (let i = 0; i < 5; i++) {
                            createEffect(x + (Math.random()-0.5)*80, y + (Math.random()-0.5)*80, currentEffect);
                        }
                    }
                }
                
                pointsDisplay.style.transform = 'scale(1.2)';
                setTimeout(() => pointsDisplay.style.transform = '', 100);
                
                refreshUI();
            }

            // --- НАГРАДА ---
            function claimAdReward() {
                if (adCooldown > 0) return;
                const reward = 1000 + Math.floor(Math.random() * 2000);
                points += reward;
                playPurchaseSound();
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        createEffect(window.innerWidth/2, window.innerHeight/2, '🎉 Конфетти');
                    }, i * 50);
                }
                startAdCooldown();
                refreshUI();
            }

            // --- СОХРАНЕНИЕ ---
            function autoSave() {
                const gameState = {
                    points, currentSkin, currentEffect,
                    buildings: buildings.map(b => ({ count: b.count, upgrades: b.upgrades })),
                    skins: skins.map(s => s.bought),
                    effects: effects.map(e => e.bought),
                    clickUpgrades: clickUpgradesList.map(u => u.bought),
                    kittenUpgrades: kittenUpgradesList.map(u => u.bought),
                    synergies: synergyList.map(u => u.bought),
                    buildingUpgrades: buildingUpgradesList.map(u => u.bought)
                };
                saveGameByIP(gameState);
            }
            function loadGame() {
                const saved = loadGameByIP();
                if (saved) {
                    points = saved.points || 0;
                    currentSkin = saved.currentSkin || 'default';
                    currentEffect = saved.currentEffect || 'none';
                    
                    saved.buildings?.forEach((b, i) => {
                        buildings[i].count = b.count;
                        buildings[i].upgrades = b.upgrades;
                    });
                    saved.skins?.forEach((val, i) => { if (skins[i]) skins[i].bought = val; });
                    saved.effects?.forEach((val, i) => { if (effects[i]) effects[i].bought = val; });
                    saved.clickUpgrades?.forEach((val, i) => { if (clickUpgradesList[i]) clickUpgradesList[i].bought = val; });
                    saved.kittenUpgrades?.forEach((val, i) => { if (kittenUpgradesList[i]) kittenUpgradesList[i].bought = val; });
                    saved.synergies?.forEach((val, i) => { if (synergyList[i]) synergyList[i].bought = val; });
                    saved.buildingUpgrades?.forEach((val, i) => { if (buildingUpgradesList[i]) buildingUpgradesList[i].bought = val; });
                    
                    achievements = buildings.reduce((sum, b) => sum + b.count, 0);
                    if (currentSkin !== 'default') {
                        clickButton.classList.add(currentSkin);
                    }
                }
                refreshUI();
            }

            // --- ПЕРЕКЛЮЧЕНИЕ МАГАЗИНОВ ---
            skinShopBtn.addEventListener('click', () => {
                skinShopDiv.style.display = skinShopDiv.style.display === 'none' ? 'block' : 'none';
                skinShopBtn.classList.toggle('active');
            });
            effectShopBtn.addEventListener('click', () => {
                effectShopDiv.style.display = effectShopDiv.style.display === 'none' ? 'block' : 'none';
                effectShopBtn.classList.toggle('active');
            });

            // --- АВТОСОХРАНЕНИЕ И АВТОКЛИК ---
            setInterval(autoSave, 30000);
            setInterval(function() {
                points += getTotalCPS();
                refreshUI();
            }, 1000);

            // --- СБРОС ---
            resetBtn.addEventListener('click', () => {
                if (confirm('Сбросить весь прогресс?')) {
                    const ip = getCookie('user_ip');
                    if (ip) {
                        const cookieName = `frog_save_${ip.replace(/\./g, '_')}`;
                        setCookie(cookieName, '', -1);
                    }
                    location.reload();
                }
            });

            // --- ПОДПИСКИ ---
            clickButton.addEventListener('click', handleClick);
            adRewardBtn.addEventListener('click', claimAdReward);

            // --- ИНИЦИАЛИЗАЦИЯ ---
            async function init() {
                await getIP();
                loadGame();
                initAudio();
                skinShopDiv.style.display = 'none';
                effectShopDiv.style.display = 'none';
            }
            init();
        })();
    </script>
</body>
</html>
