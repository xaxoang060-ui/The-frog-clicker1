<!DOCTYPE html>
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐸 Лягушкокликер — Админ-панель</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #c8e2d0 0%, #efd9c6 100%);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        .floating-lily {
            position: absolute;
            font-size: 4rem;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            animation: float 15s infinite ease-in-out;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .lily1 { top: 5%; left: 2%; animation-duration: 18s; }
        .lily2 { bottom: 10%; right: 3%; animation-duration: 22s; font-size: 5rem; }
        .lily3 { top: 20%; right: 15%; animation-duration: 14s; opacity: 0.1; font-size: 6rem; }

        .game-wrapper {
            max-width: 1400px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            position: relative;
            z-index: 10;
            margin: 0 auto;
        }
        .frog-panel {
            flex: 1.6;
            min-width: 350px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 80px 80px 60px 60px;
            padding: 30px 25px;
            box-shadow: 0 30px 40px -15px rgba(60, 40, 20, 0.4);
            text-align: center;
            border: 2px solid rgba(255, 245, 200, 0.9);
        }
        .score-label {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c5a2e;
            background: rgba(255, 250, 210, 0.7);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 40px;
            margin-bottom: 15px;
        }
        .lily-counter {
            font-size: clamp(3.5rem, 12vw, 5.5rem);
            font-weight: 900;
            color: #1a4f2a;
            text-shadow: 5px 5px 0 #ffe1b3, 0 0 15px #b3ffb0;
            line-height: 1;
            margin-bottom: 10px;
        }
        .stats {
            background: rgba(235, 225, 190, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 50px;
            padding: 12px 20px;
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #fff7e8;
            border-radius: 40px;
            padding: 8px 15px;
            flex: 1;
            text-align: center;
        }
        .stat-card span:first-child { font-weight: 600; color: #3b5e3b; display: block; font-size: 0.8rem; }
        .stat-card span:last-child { font-weight: 800; font-size: 1.3rem; color: #d47c2c; }

        .frog-btn {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #b0de8c, #408a5e);
            border: none;
            cursor: pointer;
            margin: 15px auto;
            box-shadow: 0 18px 0 #2a6a3a, 0 25px 35px rgba(0,0,0,0.3);
            transition: all 0.08s linear;
            font-size: 5.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff1b5;
            text-shadow: 4px 6px 0 #2a6a3a;
        }
        .frog-btn:active { transform: translateY(12px); box-shadow: 0 6px 0 #2a6a3a, 0 20px 30px rgba(0,0,0,0.2); }
        
        .upgrades-panel {
            flex: 2.2;
            min-width: 380px;
            background: rgba(30, 40, 25, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 60px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 2px solid #efdba1;
            max-height: 85vh;
            overflow-y: auto;
        }
        .upgrades-panel h2 { font-size: 1.8rem; text-align: center; color: #fff3cf; text-shadow: 3px 3px 0 #2c5a2e; margin-bottom: 20px; }
        .upgrade-category { background: rgba(0, 0, 0, 0.4); border-radius: 40px; padding: 15px; margin-bottom: 20px; border: 1px solid #efdba1; }
        .upgrade-category h3 { color: #ffe9a7; font-size: 1.2rem; margin-bottom: 12px; }
        .upgrade-item {
            background: #fef8e7;
            border-radius: 50px;
            padding: 10px 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 6px 0 #bba16d;
        }
        .upgrade-name { font-weight: 800; font-size: 1rem; color: #315c2b; }
        .upgrade-desc { font-size: 0.7rem; color: #5e6b4b; }
        .upgrade-price { font-weight: 800; color: #c2591c; }
        .buy-btn {
            background: #ffcf7a;
            border: none;
            font-size: 1.3rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 0 #bf8842;
            font-weight: bold;
        }
        .buy-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #bf8842; }
        .building-stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 12px; }
        .building-stat { background: #fef3df; border-radius: 30px; padding: 5px 10px; display: flex; justify-content: space-between; font-size: 0.8rem; }
        .shop-buttons { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .shop-btn { background: #f7e2b0; border: none; padding: 6px 16px; border-radius: 40px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #b3945c; }
        .reset-btn { background: #dba46a; }
        .ip-info { font-size: 0.7rem; margin-top: 10px; background: #fff1cfaa; border-radius: 30px; padding: 5px 10px; display: inline-block; }

        /* Секретная кнопка админки (видна только тебе) */
        .admin-secret-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(86, 158, 107, 0.7);
            border-radius: 50%;
            cursor: pointer;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all 0.3s;
            border: 2px solid #569e6b;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .admin-secret-btn:hover { background: rgba(86, 158, 107, 1); transform: scale(1.1); }
        .admin-secret-btn.hidden { display: none; }

        /* Админ-панель */
        .admin-mode {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
        }
        .admin-panel {
            max-width: 1400px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 25px;
        }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .stats-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card-admin { background: #fffcf0; border-radius: 30px; padding: 15px; text-align: center; border: 2px solid #ffdcaa; }
        .stat-card-admin .value { font-size: 2rem; font-weight: 900; color: #b65f1e; }
        .users-table { overflow-x: auto; }
        .users-table table { width: 100%; border-collapse: collapse; background: #fffcf0; border-radius: 20px; font-size: 0.8rem; }
        .users-table th, .users-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #ffdcaa; }
        .users-table th { background: #ffda8b; }
        .delete-btn { background: #ff8a6f; border: none; color: white; padding: 3px 10px; border-radius: 20px; cursor: pointer; }
        .export-btn, .sync-btn { background: #569e6b; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        .close-admin { background: #ff8a6f; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; margin-left: 10px; }

        .password-modal {
            background: #fffcf0;
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        .password-modal input { width: 100%; padding: 12px; font-size: 1rem; border-radius: 30px; margin-bottom: 15px; border: 2px solid #ffdcaa; }
        .password-modal button { background: #569e6b; color: white; border: none; padding: 10px 25px; border-radius: 30px; cursor: pointer; }
        
        @media (max-width: 800px) { .frog-btn { width: 200px; height: 200px; font-size: 4rem; } }
    </style>
</head>
<body>
<div class="floating-lily lily1">🌸</div>
<div class="floating-lily lily2">🍀</div>
<div class="floating-lily lily3">🐸</div>

<div class="game-wrapper">
    <div class="frog-panel">
        <div class="score-label">🐸 КВА-МОНЕТЫ 🐸</div>
        <div class="lily-counter" id="pointsDisplay">0</div>
        <div class="stats">
            <div class="stat-card"><span>⚡ За тык</span><span id="clickPowerDisplay">1</span></div>
            <div class="stat-card"><span>🪰 Мух/сек</span><span id="cpsDisplay">0</span></div>
            <div class="stat-card"><span>✨ Множ.</span><span id="multDisplay">1</span></div>
        </div>
        <button class="frog-btn" id="clickButton">🐸✨</button>
        <div class="shop-buttons">
            <button class="shop-btn" id="skinShopBtn">🎨 Скины</button>
            <button class="shop-btn" id="effectShopBtn">✨ Эффекты</button>
            <button class="shop-btn reset-btn" id="resetBtn">🔄 Сброс</button>
        </div>
        <div class="ip-info" id="ipDisplay">🌐 Загрузка...</div>
    </div>
    <div class="upgrades-panel">
        <h2>🌿 ЛАВКА ЧУДЕС 🌿</h2>
        <div id="skinShop" style="display: none;"><div class="upgrade-category"><h3>🎨 СКИНЫ</h3><div id="skinUpgrades"></div></div></div>
        <div id="effectShop" style="display: none;"><div class="upgrade-category"><h3>✨ ЭФФЕКТЫ</h3><div id="effectUpgrades"></div></div></div>
        <div class="upgrade-category"><h3>🏡 ПОСТРОЙКИ</h3><div id="buildingStats"></div><div id="buildingList"></div></div>
        <div class="upgrade-category"><h3>🐞 УЛУЧШЕНИЯ</h3><div id="clickUpgrades"></div></div>
    </div>
</div>

<!-- Секретная кнопка админки (видна только тебе) -->
<div class="admin-secret-btn hidden" id="adminSecretBtn">🔑</div>

<!-- Админ-панель -->
<div id="adminMode" class="admin-mode">
    <div class="admin-panel">
        <div class="admin-header">
            <h1>🐸 Админ-панель</h1>
            <div>
                <button class="export-btn" id="exportDataBtn">📥 Экспорт</button>
                <button class="close-admin" id="closeAdminBtn">✖️ Закрыть</button>
            </div>
        </div>
        <div class="stats-cards">
            <div class="stat-card-admin"><h3>👥 Всего</h3><div class="value" id="totalUsers">0</div></div>
            <div class="stat-card-admin"><h3>🤖 Ботов</h3><div class="value" id="totalBots">0</div></div>
            <div class="stat-card-admin"><h3>👤 Людей</h3><div class="value" id="totalHumans">0</div></div>
            <div class="stat-card-admin"><h3>⏱️ Время</h3><div class="value" id="totalPlayTime">0 ч</div></div>
        </div>
        <div class="users-table">
            <table>
                <thead><tr><th>IP</th><th>Очки</th><th>Время</th><th>Действия</th></tr></thead>
                <tbody id="usersTableBody"><tr><td colspan="4">Загрузка...</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ========================================
    // 🔴 ВАЖНО: ЗАМЕНИ ЭТОТ IP НА СВОЙ!
    // Узнай свой IP на https://api.ipify.org
    // ========================================
    const ADMIN_IP = '92.100.17.230';  // ← СЮДА ВСТАВЬ СВОЙ IP (например '85.12.34.56')
    const ADMIN_PASSWORD = 'admin123';       // Пароль для входа в админку
    
    // ========== ИГРОВАЯ ЛОГИКА ==========
    let points = 0;
    let currentSkin = 'default';
    let currentEffect = 'none';
    let usersData = {};
    let currentIP = null;
    
    // Простые данные для демонстрации
    const skins = [
        { name: '🐸 Золотая', class: 'skin-gold', cost: 10000, bought: false },
        { name: '🌈 Радужная', class: 'skin-rainbow', cost: 50000, bought: false },
        { name: '💎 Хрустальная', class: 'skin-crystal', cost: 200000, bought: false }
    ];
    const effects = [
        { name: '🎉 Конфетти', cost: 5000, bought: false },
        { name: '🍃 Листья', cost: 25000, bought: false },
        { name: '⭐ Звёздочки', cost: 75000, bought: false }
    ];
    const buildings = [
        { name: '🐸 Жабёнок', count: 0, baseCost: 15, cps: 0.1, upgrades: 0 },
        { name: '👵 Ква-бабушка', count: 0, baseCost: 100, cps: 1, upgrades: 0 },
        { name: '🌾 Кувшинка', count: 0, baseCost: 1100, cps: 8, upgrades: 0 },
        { name: '⛏️ Норка', count: 0, baseCost: 12000, cps: 47, upgrades: 0 }
    ];
    const clickUpgradesList = [
        { name: '🐞 Маленький жучок', desc: '+1 за жабёнка', cost: 100, bought: false },
        { name: '🦗 Кузнечик', desc: '+0.1 за жабёнка', cost: 500, bought: false },
        { name: '🕷️ Паучок', desc: '+1 за жабёнка', cost: 10000, bought: false }
    ];
    
    function getClickPower() {
        let power = 1;
        if(clickUpgradesList[0]?.bought) power += buildings[0].count;
        if(clickUpgradesList[1]?.bought) power += buildings[0].count * 0.1;
        if(clickUpgradesList[2]?.bought) power += buildings[0].count;
        return power;
    }
    function getBuildingCPS(idx){ return buildings[idx].cps * buildings[idx].count; }
    function getTotalCPS() {
        let total = 0;
        for(let i=0;i<buildings.length;i++) total += getBuildingCPS(i);
        return total;
    }
    
    function refreshUI() {
        document.getElementById('pointsDisplay').innerText = Math.floor(points);
        document.getElementById('clickPowerDisplay').innerText = getClickPower().toFixed(1);
        document.getElementById('cpsDisplay').innerText = getTotalCPS().toFixed(1);
        
        let statsHtml = '';
        for(let i=0;i<buildings.length;i++) statsHtml += `<div class="building-stat"><span>${buildings[i].name}</span><span>${buildings[i].count} (${getBuildingCPS(i).toFixed(1)}/c)</span></div>`;
        document.getElementById('buildingStats').innerHTML = statsHtml;
        
        let buildingHtml = '';
        for(let i=0;i<buildings.length;i++){
            let cost = Math.floor(buildings[i].baseCost * Math.pow(1.15, buildings[i].count));
            buildingHtml += `<div class="upgrade-item"><div><div class="upgrade-name">${buildings[i].name}</div><div class="upgrade-desc">${buildings[i].count} шт</div></div><div><div class="upgrade-price">🐸 ${cost}</div><button class="buy-btn" onclick="buyBuilding(${i})" ${points<cost ? 'disabled':''}>➕</button></div></div>`;
        }
        document.getElementById('buildingList').innerHTML = buildingHtml;
        
        let clickHtml = '';
        clickUpgradesList.forEach((u,idx)=>{ if(!u.bought) clickHtml+=`<div class="upgrade-item"><div><div class="upgrade-name">${u.name}</div><div class="upgrade-desc">${u.desc}</div></div><div><div class="upgrade-price">🐸 ${u.cost}</div><button class="buy-btn" onclick="buyClickUpgrade(${idx})" ${points<u.cost ? 'disabled':''}>➕</button></div></div>`; });
        document.getElementById('clickUpgrades').innerHTML = clickHtml || '<div class="upgrade-item">✨ Всё куплено</div>';
        
        let skinHtml = '';
        skins.forEach((s,i)=>{ let active = currentSkin===s.class; skinHtml+=`<div class="upgrade-item ${s.bought?'purchased':''}"><div><div class="upgrade-name">${s.name} ${active?'✅':''}</div><div class="upgrade-desc">${s.bought?'куплен':'стоит '+s.cost}</div></div><div><div class="upgrade-price">🐸 ${s.cost}</div><button class="buy-btn" onclick="buySkin(${i})" ${s.bought || points<s.cost ? 'disabled':''}>${s.bought?'✓':'➕'}</button></div></div>`; });
        document.getElementById('skinUpgrades').innerHTML = skinHtml;
        
        let effectHtml = '';
        effects.forEach((e,i)=>{ let active = currentEffect===e.name; effectHtml+=`<div class="upgrade-item ${e.bought?'purchased':''}"><div><div class="upgrade-name">${e.name} ${active?'✅':''}</div><div class="upgrade-desc">${e.bought?'куплен':'стоит '+e.cost}</div></div><div><div class="upgrade-price">🐸 ${e.cost}</div><button class="buy-btn" onclick="buyEffect(${i})" ${e.bought || points<e.cost ? 'disabled':''}>${e.bought?'✓':'➕'}</button></div></div>`; });
        document.getElementById('effectUpgrades').innerHTML = effectHtml;
    }
    
    function playSound() {
        try { let audio = new Audio(); audio.volume = 0; } catch(e){}
    }
    
    window.buyBuilding = function(id){
        let cost = Math.floor(buildings[id].baseCost * Math.pow(1.15, buildings[id].count));
        if(points>=cost){ points-=cost; buildings[id].count++; refreshUI(); saveGame(); }
    };
    window.buyClickUpgrade = function(idx){ let u=clickUpgradesList[idx]; if(points>=u.cost && !u.bought){ points-=u.cost; u.bought=true; refreshUI(); saveGame(); } };
    window.buySkin = function(idx){
        let s=skins[idx];
        if(points>=s.cost && !s.bought){
            points-=s.cost; s.bought=true;
            if(currentSkin!=='default') document.getElementById('clickButton').classList.remove(currentSkin);
            document.getElementById('clickButton').classList.add(s.class);
            currentSkin=s.class; refreshUI(); saveGame();
        }
    };
    window.buyEffect = function(idx){
        let e=effects[idx];
        if(points>=e.cost && !e.bought){
            points-=e.cost; e.bought=true;
            currentEffect=e.name; refreshUI(); saveGame();
        }
    };
    
    function handleClick(){
        let gain = getClickPower();
        points += gain;
        let btn = document.getElementById('clickButton');
        btn.style.transform = 'scale(0.95)';
        setTimeout(()=> btn.style.transform = '', 100);
        refreshUI();
        saveGame();
    }
    
    // Сохранение
    function saveGame() {
        let state = { points, currentSkin, currentEffect, buildings: buildings.map(b=>({count:b.count})), skins:skins.map(s=>s.bought), effects:effects.map(e=>e.bought), clickUpgrades:clickUpgradesList.map(u=>u.bought) };
        localStorage.setItem('frog_save', JSON.stringify(state));
        if(currentIP && usersData[currentIP]){
            usersData[currentIP].points = points;
            usersData[currentIP].totalPlayTime = (usersData[currentIP].totalPlayTime||0)+1;
            localStorage.setItem('frog_users', JSON.stringify(usersData));
        }
    }
    function loadGame() {
        let saved = localStorage.getItem('frog_save');
        if(saved){
            let s = JSON.parse(saved);
            points = s.points||0;
            currentSkin = s.currentSkin||'default';
            currentEffect = s.currentEffect||'none';
            s.buildings?.forEach((b,i)=> buildings[i].count=b.count);
            s.skins?.forEach((v,i)=> skins[i].bought=v);
            s.effects?.forEach((v,i)=> effects[i].bought=v);
            s.clickUpgrades?.forEach((v,i)=> clickUpgradesList[i].bought=v);
            if(currentSkin!=='default') document.getElementById('clickButton').classList.add(currentSkin);
        }
        refreshUI();
    }
    
    // Админ-панель
    function refreshAdminPanel() {
        let users = Object.values(usersData);
        document.getElementById('totalUsers').innerText = users.length;
        let totalTime = users.reduce((s,u)=>s+(u.totalPlayTime||0),0);
        document.getElementById('totalPlayTime').innerText = Math.floor(totalTime/3600)+' ч';
        let tbody = document.getElementById('usersTableBody');
        if(users.length===0){ tbody.innerHTML='<tr><td colspan="4">Нет данных</td></tr>'; return; }
        tbody.innerHTML = users.map(u=>{ let ip = Object.keys(usersData).find(k=>usersData[k]===u); return `<tr><td>${ip?.substring(0,15)}</td><td>${Math.floor(u.points||0)}</td><td>${Math.floor((u.totalPlayTime||0)/60)} мин</td><td><button class="delete-btn" onclick="deleteUser('${ip}')">Удалить</button></td></tr>`; }).join('');
    }
    window.deleteUser = function(ip){ if(confirm(`Удалить ${ip}?`)){ delete usersData[ip]; localStorage.setItem('frog_users', JSON.stringify(usersData)); refreshAdminPanel(); } };
    
    // Секретная кнопка (только по IP)
    const secretBtn = document.getElementById('adminSecretBtn');
    const adminModeDiv = document.getElementById('adminMode');
    
    function showPasswordModal() {
        let ov = document.createElement('div');
        ov.style.position='fixed'; ov.style.top=0; ov.style.left=0; ov.style.right=0; ov.style.bottom=0;
        ov.style.background='rgba(0,0,0,0.8)'; ov.style.display='flex'; ov.style.alignItems='center'; ov.style.justifyContent='center'; ov.style.zIndex=3000;
        ov.innerHTML = `<div class="password-modal"><h2>🔐 Доступ</h2><input type="password" id="adminPassInput" placeholder="Пароль"><button id="submitAdminPass">Войти</button><div id="passErr" style="color:red; display:none;">Неверный пароль!</div></div>`;
        document.body.appendChild(ov);
        document.getElementById('submitAdminPass').onclick = () => {
            if(document.getElementById('adminPassInput').value === ADMIN_PASSWORD){
                ov.remove(); adminModeDiv.style.display='block'; refreshAdminPanel();
            } else { document.getElementById('passErr').style.display='block'; }
        };
    }
    
    secretBtn.onclick = () => showPasswordModal();
    document.getElementById('closeAdminBtn').onclick = () => adminModeDiv.style.display='none';
    document.getElementById('exportDataBtn').onclick = () => {
        let data = JSON.stringify(usersData,null,2); let blob = new Blob([data],{type:'application/json'});
        let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `users_${new Date().toISOString().slice(0,10)}.json`; a.click();
    };
    
    // Запуск
    (async function(){
        let ip = localStorage.getItem('user_ip');
        if(!ip){
            let res = await fetch('https://api.ipify.org?format=json');
            let j = await res.json();
            ip = j.ip;
            localStorage.setItem('user_ip',ip);
        }
        currentIP = ip;
        document.getElementById('ipDisplay').innerHTML = `🌐 IP: ${ip.substring(0,12)}...`;
        
        // Показываем секретную кнопку только если IP совпадает
        if(currentIP === ADMIN_IP) {
            secretBtn.classList.remove('hidden');
            console.log('✅ Админ-доступ разрешён');
        } else {
            secretBtn.classList.add('hidden');
            console.log('❌ Админ-доступ запрещён (ваш IP не совпадает)');
        }
        
        let savedUsers = localStorage.getItem('frog_users');
        if(savedUsers) usersData = JSON.parse(savedUsers);
        if(!usersData[currentIP]) usersData[currentIP] = { points:0, totalPlayTime:0, firstSeen: new Date().toISOString() };
        
        loadGame();
        document.getElementById('clickButton').addEventListener('click', handleClick);
        setInterval(()=>{ points += getTotalCPS(); refreshUI(); saveGame(); }, 1000);
        
        document.getElementById('skinShopBtn').onclick = ()=>{ let b=document.getElementById('skinShop'); b.style.display = b.style.display==='none'?'block':'none'; };
        document.getElementById('effectShopBtn').onclick = ()=>{ let b=document.getElementById('effectShop'); b.style.display = b.style.display==='none'?'block':'none'; };
        document.getElementById('resetBtn').onclick = ()=>{ if(confirm('Сбросить прогресс?')){ localStorage.removeItem('frog_save'); location.reload(); } };
    })();
</script>
</body>
</html>
